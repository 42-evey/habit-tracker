<style>
/* ========== RESET ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ========== VARIABLES (from DESIGN-SYSTEM.css) ========== */
:root{
  /* Backgrounds */
  --bg:#0a0a0f;
  --surface:#13131f;
  --surface-hover:#1a1a2e;
  --overlay:rgba(0,0,0,0.7);

  /* Accent */
  --accent:#00ff42;
  --accent-hover:#00cc35;
  --accent-dim:rgba(0,255,66,0.1);

  /* Text — NO grey. White for primary, light for secondary, muted for tertiary */
  --text:#f0f0f5;
  --text-sec:#c8c8d8;
  --text-dim:#8888a0;

  /* Borders */
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.15);

  /* Semantic */
  --danger:#ff4455;
  --warn:#ffaa00;
  --success:#00ff42;

  /* Typography */
  --font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;

  /* Spacing (8px grid) */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;--s8:64px;

  /* Radii */
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-full:99px;

  /* Transitions */
  --ease:cubic-bezier(0.16,1,0.3,1);
  --dur:0.2s;
}

/* ========== BASE ========== */
html,body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  min-height:100vh
}
a{color:var(--accent);text-decoration:none;transition:opacity var(--dur)}
a:hover{opacity:0.85}
button{cursor:pointer;border:none;font-family:var(--font);font-size:inherit}

/* Animated BG */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 25% 10%,rgba(0,255,66,0.06) 0%,transparent 70%),radial-gradient(ellipse 60% 70% at 80% 80%,rgba(100,120,255,0.05) 0%,transparent 70%);animation:meshShift 25s ease-in-out infinite alternate}
@keyframes meshShift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-2%,1%) scale(1.03)}100%{transform:translate(1%,-1%) scale(0.98)}}

/* Floating Pill Nav (Desktop) */

/* ========== BUTTONS ========== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border-radius:var(--r-md);
  font-size:0.85rem;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:all var(--dur) var(--ease);
  border:none;text-decoration:none;line-height:1
}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,255,66,0.2);opacity:1}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);opacity:1}
.btn-ghost{background:transparent;color:var(--text-sec);border:1px solid var(--border);padding:6px 14px;font-size:0.78rem}
.btn-ghost:hover{color:var(--text);border-color:var(--border-hover);opacity:1}
.btn-sm{padding:6px 12px;font-size:0.75rem}
.btn-danger{background:var(--danger);color:#fff}

/* ========== CARDS ========== */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;
  transition:all var(--dur) var(--ease);
  display:block;color:inherit;text-decoration:none
}
.card:hover{transform:translateY(-2px);border-color:var(--border-hover);background:var(--surface-hover);opacity:1}

/* ========== STATS ========== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border)}
.stat{background:var(--surface);padding:18px 12px;text-align:center}
.stat-value{font-size:1.4rem;font-weight:800;color:var(--accent);font-family:var(--mono)}
.stat-label{font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

/* ========== INPUTS ========== */
input[type="text"],input[type="number"],input[type="url"],input[type="date"],input[type="search"],
textarea,select{
  width:100%;background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:10px 14px;font-family:var(--font);font-size:0.88rem;
  outline:none;transition:border-color var(--dur)
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
::placeholder{color:var(--text-dim)}

/* ========== MODAL ========== */
.modal-overlay{
  position:fixed;inset:0;background:var(--overlay);
  display:none;align-items:center;justify-content:center;
  z-index:500;padding:20px
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:24px;
  width:100%;max-width:440px;max-height:85vh;overflow-y:auto
}
.modal h2{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.72rem;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
.form-actions{display:flex;gap:8px;margin-top:18px}
.form-actions .btn{flex:1}

/* ========== TOAST ========== */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface);color:var(--text);
  padding:10px 20px;border-radius:var(--r-md);
  font-size:0.82rem;font-weight:500;
  z-index:900;transition:transform 0.3s var(--ease);
  border:1px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,0.4)
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ========== SECTION ========== */
.section{max-width:800px;margin:0 auto;padding:0 24px 48px}
.section-label{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:16px}

/* ========== FOOTER ========== */
.footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);max-width:800px;margin:0 auto;position:relative;z-index:1}
.footer-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:0.72rem;color:var(--text-sec)}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.58rem;color:var(--text-dim)}

/* ========== APP-SPECIFIC ========== */
.app-body{padding-top:80px}

/* Search bar */
.toolbar{max-width:800px;margin:0 auto;padding:var(--s4) var(--s5)}
.search-wrap{position:relative}
.search-wrap input{padding-left:36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md)}
.search-wrap::before{
  content:"";position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;border:2px solid var(--text-dim);border-radius:50%;pointer-events:none
}
.search-wrap::after{
  content:"";position:absolute;left:25px;top:calc(50% + 7px);
  width:2px;height:6px;background:var(--text-dim);
  transform:rotate(-45deg);transform-origin:top left;pointer-events:none
}

/* Stats section */
.stats-section{max-width:800px;margin:0 auto;padding:var(--s4) var(--s5) 0}

/* Week nav */
.week-nav{
  display:flex;align-items:center;justify-content:center;gap:var(--s3);
  max-width:800px;margin:0 auto;padding:var(--s3) var(--s5)
}
.week-nav button{
  background:var(--surface);color:var(--text-sec);
  padding:6px 14px;border-radius:var(--r-sm);font-size:0.82rem;
  font-weight:500;border:1px solid var(--border);transition:all var(--dur) var(--ease)
}
.week-nav button:hover{border-color:var(--border-hover);color:var(--text)}
.week-label{font-size:0.82rem;color:var(--text-sec);min-width:160px;text-align:center;font-weight:500}

/* Habit list */
.habit-list{display:flex;flex-direction:column;gap:var(--s3)}

/* Habit card */
.habit-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:var(--s5);
  display:flex;flex-direction:column;gap:var(--s3);
  transition:all var(--dur) var(--ease)
}
.habit-card:hover{border-color:var(--border-hover);background:var(--surface-hover)}
.habit-header{display:flex;align-items:center;justify-content:space-between}
.habit-name{font-size:0.92rem;font-weight:600;color:#fff}
.habit-streak{font-size:0.75rem;color:var(--accent);font-weight:600;font-family:var(--mono)}
.habit-desc{font-size:0.8rem;color:var(--text-sec);line-height:1.5}
.habit-days{display:flex;gap:var(--s1);flex-wrap:wrap}
.day-dot{
  width:32px;height:32px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:600;cursor:pointer;
  transition:all var(--dur) var(--ease);
  background:var(--bg);color:var(--text-dim);border:1px solid var(--border)
}
.day-dot.completed{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.day-dot.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.day-dot:hover{transform:scale(1.12)}
.habit-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--s2)}
.habit-meta{font-size:0.7rem;color:var(--text-dim);font-family:var(--mono)}
.habit-actions{display:flex;gap:var(--s2)}

/* Color picker */
.color-options{display:flex;gap:var(--s2);flex-wrap:wrap}
.color-dot{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  transition:transform var(--dur) var(--ease);border:2px solid transparent
}
.color-dot:hover{transform:scale(1.2)}
.color-dot.selected{border-color:#fff;box-shadow:0 0 0 2px var(--bg)}

/* Frequency selector */
.freq-options{display:flex;gap:var(--s2);flex-wrap:wrap}
.freq-btn{
  padding:6px 12px;border-radius:var(--r-sm);font-size:0.75rem;
  background:var(--bg);color:var(--text-dim);border:1px solid var(--border);
  cursor:pointer;transition:all var(--dur) var(--ease);font-weight:500
}
.freq-btn.selected{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.freq-btn:hover{border-color:var(--border-hover)}

/* Empty state */
.empty{text-align:center;padding:var(--s8) var(--s5)}
.empty h3{color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:var(--s2)}
.empty p{color:var(--text-sec);font-size:0.88rem;margin-bottom:var(--s5)}

/* Settings */
.settings-section{margin-top:var(--s4)}
.settings-section h3{font-size:0.85rem;color:#fff;margin-bottom:var(--s3);font-weight:600}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--s3) 0;border-bottom:1px solid var(--border)
}
.settings-row:last-child{border:none}
.settings-row span{font-size:0.85rem;color:var(--text-sec)}

/* ========== RESPONSIVE ========== */
@media(max-width:640px){

  body{padding-bottom:64px}
  .footer{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  .section{padding:0 20px 40px}
  .stats-section{padding:var(--s3) 20px 0}
  .toolbar{padding:var(--s3) 20px}
  .week-nav{padding:var(--s2) 20px}
  .day-dot{width:28px;height:28px;font-size:0.6rem}
  .habit-card{padding:var(--s4)}
}

/* ========== REDUCED MOTION ========== */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>

<script>
const COLORS = ['#00ff42','#00ccff','#ff6600','#ff44aa','#aa44ff','#ffcc00','#ff4444','#44ffaa'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let habits = JSON.parse(localStorage.getItem('evey-habits') || '[]');
let weekOffset = 0;
let editingId = null;

function save() {
  localStorage.setItem('evey-habits', JSON.stringify(habits));
}

// Migrate from old key if exists
(function migrate() {
  const old = localStorage.getItem('habits');
  if (old && !localStorage.getItem('evey-habits')) {
    localStorage.setItem('evey-habits', old);
    habits = JSON.parse(old);
  }
})();

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function getWeekStart(offset) {
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7) + offset * 7);
  d.setHours(0, 0, 0, 0);
  return d;
}

function dateKey(d) {
  return d.toISOString().split('T')[0];
}

function isToday(d) {
  return dateKey(d) === dateKey(new Date());
}

function getStreak(habit) {
  let streak = 0;
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  while (true) {
    const key = dateKey(d);
    if (habit.completions && habit.completions[key]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (isToday(d)) {
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getCompletionRate(habit, days) {
  if (!habit.completions) return 0;
  const now = new Date();
  let completed = 0, total = 0;
  for (let i = 0; i < days; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dow = (d.getDay() + 6) % 7;
    if (!habit.frequency || habit.frequency.includes(dow)) {
      total++;
      if (habit.completions[dateKey(d)]) completed++;
    }
  }
  return total > 0 ? Math.round(completed / total * 100) : 0;
}

function toggleDay(habitId, dateStr) {
  const habit = habits.find(h => h.id === habitId);
  if (!habit) return;
  if (!habit.completions) habit.completions = {};
  if (habit.completions[dateStr]) {
    delete habit.completions[dateStr];
  } else {
    habit.completions[dateStr] = true;
  }
  save();
  render();
}

function getFilteredHabits() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  if (!q) return habits;
  return habits.filter(h =>
    h.name.toLowerCase().includes(q) ||
    (h.description && h.description.toLowerCase().includes(q))
  );
}

function render() {
  const list = document.getElementById('habit-list');
  const weekStart = getWeekStart(weekOffset);
  const filtered = getFilteredHabits();

  // Week label
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  document.getElementById('week-label').textContent =
    weekOffset === 0 ? 'This Week' :
    weekOffset === -1 ? 'Last Week' :
    fmt(weekStart) + ' \u2013 ' + fmt(weekEnd);

  if (habits.length === 0) {
    list.innerHTML = '<div class="empty"><h3>No habits yet</h3><p>Start tracking habits to build consistency and see your streaks grow.</p><button class="btn btn-primary" onclick="showAddHabit()">Add Your First Habit</button></div>';
    updateStats();
    return;
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><h3>No matches</h3><p>No habits match your search.</p></div>';
    updateStats();
    return;
  }

  list.innerHTML = filtered.map(h => {
    const streak = getStreak(h);
    const rate = getCompletionRate(h, 30);
    const color = h.color || COLORS[0];
    let daysHtml = '';
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      const key = dateKey(d);
      const completed = h.completions && h.completions[key];
      const today = isToday(d);
      daysHtml += '<div class="day-dot' + (completed ? ' completed' : '') + (today ? ' today' : '') + '"'
        + ' style="' + (completed ? 'background:' + color + ';border-color:' + color + ';color:var(--bg)' : '') + '"'
        + ' onclick="toggleDay(\'' + h.id + '\',\'' + key + '\')"'
        + '>' + DAYS[i] + '</div>';
    }
    return '<div class="habit-card">'
      + '<div class="habit-header">'
      + '<span class="habit-name" style="color:' + color + '">' + esc(h.name) + '</span>'
      + '<span class="habit-streak">' + (streak > 0 ? streak + 'd streak' : '') + '</span>'
      + '</div>'
      + (h.description ? '<div class="habit-desc">' + esc(h.description) + '</div>' : '')
      + '<div class="habit-days">' + daysHtml + '</div>'
      + '<div class="habit-footer">'
      + '<span class="habit-meta">' + rate + '% (30d) &middot; ' + (h.frequency ? h.frequency.map(f => DAYS[f]).join(', ') : 'Daily') + '</span>'
      + '<div class="habit-actions">'
      + '<button class="btn btn-ghost btn-sm" onclick="editHabit(\'' + h.id + '\')">Edit</button>'
      + '<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteHabit(\'' + h.id + '\')">Del</button>'
      + '</div></div></div>';
  }).join('');

  updateStats();
}

function updateStats() {
  const today = dateKey(new Date());
  let doneToday = 0, bestStreak = 0, totalRate = 0;
  habits.forEach(h => {
    if (h.completions && h.completions[today]) doneToday++;
    const s = getStreak(h);
    if (s > bestStreak) bestStreak = s;
    totalRate += getCompletionRate(h, 30);
  });
  document.getElementById('stat-total').textContent = habits.length;
  document.getElementById('stat-today').textContent = doneToday + '/' + habits.length;
  document.getElementById('stat-streak').textContent = bestStreak;
  document.getElementById('stat-rate').textContent = habits.length > 0 ? Math.round(totalRate / habits.length) + '%' : '0%';
}

function showAddHabit() {
  editingId = null;
  showHabitForm({});
}

function editHabit(id) {
  editingId = id;
  const habit = habits.find(h => h.id === id);
  if (habit) showHabitForm(habit);
}

function showHabitForm(h) {
  const modal = document.getElementById('modal-content');
  const freq = h.frequency || [0, 1, 2, 3, 4, 5, 6];
  modal.innerHTML =
    '<h2>' + (editingId ? 'Edit' : 'New') + ' Habit</h2>'
    + '<div class="form-group">'
    + '<label>Name</label>'
    + '<input type="text" id="h-name" value="' + esc(h.name || '') + '" placeholder="Exercise, Read, Meditate...">'
    + '</div>'
    + '<div class="form-group">'
    + '<label>Description (optional)</label>'
    + '<input type="text" id="h-desc" value="' + esc(h.description || '') + '" placeholder="30 min workout, 20 pages...">'
    + '</div>'
    + '<div class="form-group">'
    + '<label>Color</label>'
    + '<div class="color-options">'
    + COLORS.map(c => '<div class="color-dot' + (c === (h.color || COLORS[0]) ? ' selected' : '') + '" style="background:' + c + '" onclick="selectColor(this,\'' + c + '\')"></div>').join('')
    + '</div></div>'
    + '<div class="form-group">'
    + '<label>Frequency</label>'
    + '<div class="freq-options">'
    + DAYS.map((d, i) => '<div class="freq-btn' + (freq.includes(i) ? ' selected' : '') + '" data-day="' + i + '" onclick="toggleFreq(this)">' + d + '</div>').join('')
    + '</div></div>'
    + '<div class="form-actions">'
    + '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="saveHabit()">Save</button>'
    + '</div>';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('h-name').focus(), 100);
}

function selectColor(el, color) {
  el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleFreq(el) {
  el.classList.toggle('selected');
}

function saveHabit() {
  const name = document.getElementById('h-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const desc = document.getElementById('h-desc').value.trim();
  const colorEl = document.querySelector('.color-dot.selected');
  const color = colorEl ? colorEl.style.background : COLORS[0];
  const freqEls = document.querySelectorAll('.freq-btn.selected');
  const frequency = Array.from(freqEls).map(el => parseInt(el.getAttribute('data-day')));

  if (editingId) {
    const habit = habits.find(h => h.id === editingId);
    if (habit) {
      habit.name = name;
      habit.description = desc;
      habit.color = color;
      habit.frequency = frequency.length === 7 ? null : frequency;
    }
    toast('Habit updated');
  } else {
    habits.push({
      id: genId(),
      name,
      description: desc,
      color,
      frequency: frequency.length === 7 ? null : frequency,
      completions: {},
      created: new Date().toISOString()
    });
    toast('Habit added');
  }
  save();
  closeModal();
  render();
}

function deleteHabit(id) {
  if (!confirm('Delete this habit and all its history?')) return;
  habits = habits.filter(h => h.id !== id);
  save();
  render();
  toast('Habit deleted');
}

function changeWeek(dir) {
  weekOffset += dir;
  if (weekOffset > 0) weekOffset = 0;
  render();
}

function showSettings() {
  const modal = document.getElementById('modal-content');
  modal.innerHTML =
    '<h2>Settings</h2>'
    + '<div class="settings-section">'
    + '<div class="settings-row">'
    + '<span>Export Data</span>'
    + '<button class="btn btn-ghost btn-sm" onclick="exportData()">Export JSON</button>'
    + '</div>'
    + '<div class="settings-row">'
    + '<span>Import Data</span>'
    + '<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'import-file\').click()">Import JSON</button>'
    + '<input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">'
    + '</div>'
    + '<div class="settings-row">'
    + '<span style="color:var(--danger)">Clear All Data</span>'
    + '<button class="btn btn-danger btn-sm" onclick="clearData()">Clear</button>'
    + '</div>'
    + '</div>'
    + '<div class="form-actions">'
    + '<button class="btn btn-ghost" onclick="closeModal()" style="flex:1">Close</button>'
    + '</div>';
  document.getElementById('modal-overlay').classList.add('active');
}

function exportData() {
  const blob = new Blob([JSON.stringify(habits, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'habits-' + dateKey(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Data exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        habits = data;
        save();
        render();
        closeModal();
        toast('Imported ' + data.length + ' habits');
      } else {
        toast('Invalid file format');
      }
    } catch (err) { toast('Failed to parse file'); }
  };
  reader.readAsText(file);
}

function clearData() {
  if (!confirm('Delete ALL habits and history? This cannot be undone.')) return;
  habits = [];
  save();
  render();
  closeModal();
  toast('All data cleared');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-overlay').classList.remove('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !e.altKey && document.activeElement.tagName !== 'INPUT' && !document.getElementById('modal-overlay').classList.contains('active')) {
    showAddHabit();
  }
});

// Touch: swipe left/right for week nav
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) {
    changeWeek(diff > 0 ? -1 : 1);
  }
}, { passive: true });

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}

// Init
render();
</script>
</body>
</html>
